spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update

cloud:
  aws:
    region:
        static: sa-east-1
    credentials:
      access-key: test
      secret-key: test

aws:
  endpoint: http://localstack:4566

payment-service:
  sqs:
    order-checkout:
      queue-name: PAYMENT_SERVICE_ORDER_CHECKOUT_QUEUE
    payment-revert:
      queue-name: PAYMENT_SERVICE_PAYMENT_REVERT_QUEUE
  sns:
    order-action:
      topic-arn: arn:aws:sns:sa-east-1:000000000000:ORDER_ACTION
