server.port: 8081

spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cloud:
    aws:
      endpoint: http://localhost:4566
      region:
          static: sa-east-1
      credentials:
        access-key: test
        secret-key: test

payment-service:
  sqs:
    order-checkout:
      queue-name: PAYMENT_SERVICE_ORDER_CHECKOUT_QUEUE
    payment-revert:
      queue-name: PAYMENT_SERVICE_PAYMENT_REVERT_QUEUE
  sns:
    order-action:
      topic-arn: arn:aws:sns:sa-east-1:000000000000:ORDER_ACTION
