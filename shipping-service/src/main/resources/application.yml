spring:
  application:
    name: shipping-service
  datasource:
    url: jdbc:postgresql://localhost:5432/shipping_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cloud:
    aws:
      endpoint: http://localhost:4566
      region:
        static: sa-east-1
      credentials:
        access-key: test
        secret-key: test


shipping-service:
  sqs:
    inventory-write-off:
      queue-name: SHIPPING_SERVICE_INVENTORY_WRITE_OFF
  sns:
    order-action:
      topic-arn: arn:aws:sns:sa-east-1:000000000000:ORDER_ACTION
  rest:
    order-service:
      base-url: http://localhost:8080

server:
  port: 8083

